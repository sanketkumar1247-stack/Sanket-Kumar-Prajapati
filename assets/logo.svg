<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Gold Metallic Gradients -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D06B"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#AA820A"/>
      <stop offset="100%" stop-color="#F7E5A9"/>
    </linearGradient>

    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>

    <!-- Cyan Accent Halo Gradient -->
    <linearGradient id="cyanHalo" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Deep Navy Medallion Background -->
    <radialGradient id="navyBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#112240"/>
      <stop offset="85%" stop-color="#060E1A"/>
      <stop offset="100%" stop-color="#03070D"/>
    </radialGradient>

    <!-- Drop Shadows -->
    <filter id="glowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#D4AF37" flood-opacity="0.3"/>
    </filter>

    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Ambient Glow Ring -->
  <circle cx="60" cy="60" r="56" fill="url(#goldGlow)"/>

  <!-- Outer Cyan Accent Dash Ring -->
  <circle cx="60" cy="60" r="53" fill="none" stroke="url(#cyanHalo)" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.75"/>

  <!-- Main Medallion Base -->
  <circle cx="60" cy="60" r="48" fill="url(#navyBg)" stroke="url(#goldGradient)" stroke-width="2.5" filter="url(#glowShadow)"/>

  <!-- Inner Concentric Gold Border -->
  <circle cx="60" cy="60" r="43" fill="none" stroke="url(#goldGradient)" stroke-width="1" stroke-dasharray="80 2" opacity="0.85"/>

  <!-- European Union Star Circle Arc (12 Stars Motif) -->
  <g fill="url(#goldGradient)" opacity="0.85">
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(30 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(60 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(90 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(120 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(150 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(180 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(210 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(240 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(270 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(300 60 60) scale(0.85) translate(10.5, 3.5)"/>
    <polygon points="60,18.5 61.2,21 63.8,21.2 61.8,22.9 62.4,25.5 60,24.1 57.6,25.5 58.2,22.9 56.2,21.2 58.8,21" transform="rotate(330 60 60) scale(0.85) translate(10.5, 3.5)"/>
  </g>

  <!-- Open Book Academic Base Motif in Gold -->
  <path d="M42 74 C 50 71, 57 73, 60 76 C 63 73, 70 71, 78 74 L 78 78 C 70 75, 63 77, 60 80 C 57 77, 50 75, 42 78 Z" fill="url(#goldGradient)" opacity="0.9"/>
  <path d="M60 76 L 60 80" stroke="#060E1A" stroke-width="1"/>

  <!-- SKP Interlocking Monogram Lettering -->
  <text x="60" y="65" 
        font-family="'Cinzel', 'Playfair Display', 'Times New Roman', Georgia, serif" 
        font-size="25" 
        font-weight="900" 
        letter-spacing="1.5" 
        fill="url(#goldGradient)" 
        text-anchor="middle" 
        filter="url(#subtleGlow)">SKP</text>

  <!-- Cyan Sparkle Accent -->
  <circle cx="82" cy="38" r="1.8" fill="#00F0FF"/>
</svg>
